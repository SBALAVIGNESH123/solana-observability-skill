version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: solana-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerting:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.1.0
    container_name: solana-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=solana-obs
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/solana-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

  solana-exporter:
    image: node:20-alpine
    container_name: solana-exporter
    working_dir: /app
    volumes:
      - ../examples:/app
      - node-modules:/app/node_modules
    command: sh -c "npm install --prefix /app 2>/dev/null; npx tsx /app/rpc-health-monitor.ts"
    environment:
      - SOLANA_RPC_ENDPOINTS=https://api.mainnet-beta.solana.com
      - METRICS_PORT=9100
      - CHECK_INTERVAL_MS=15000
    ports:
      - '9100:9100'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9100/metrics']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - observability

volumes:
  prometheus-data:
  grafana-data:
  node-modules:

networks:
  observability:
    driver: bridge
