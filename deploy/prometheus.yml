global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Solana RPC Health Exporter (our custom exporter)
  - job_name: solana_rpc_health
    static_configs:
      - targets: ['solana-exporter:9100']
    metrics_path: /metrics
    scrape_interval: 15s

  # Solana Validator Metrics (if running local validator)
  # The validator exposes metrics on port 8899 by default
  - job_name: solana_validator
    static_configs:
      - targets: ['host.docker.internal:8899']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
    # Only scrape if validator is running
    honor_labels: true

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for host metrics (optional)
  # NOTE: port 9101 to avoid conflict with solana-exporter on 9100
  - job_name: node_exporter
    static_configs:
      - targets: ['host.docker.internal:9101']
    scrape_interval: 30s
